<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>crud peliculas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CRUD de Peliculas</h1>
    <form id="formulario" placeholder="id" type="hidden">
<input type="text" placeholder="Titulo" id="titulo">
<input type="text" placeholder="Director" id="director">
<input type="number" placeholder="Año" id="año">
<button type="submit">Guardar</button>
    </form>
    <table>
<thead>
<tr>
    <th>ID</th>
    <th>Titulo</th>
    <th>Director</th>
    <th>Año</th>
    <th>Acciones</th>
</tr>
</thead>
<tbody id="tablaPeliculas"></tbody>
    </table>
    <script src="script2.js"></script>
</body>
</html>
